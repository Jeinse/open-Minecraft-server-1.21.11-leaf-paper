dialog:
  canCloseWithEscape: false
  columns: 2

login:
  title: "正在自动下载原神......"
  body:
    - <b><gradient:#128BDE:#128BDE>温馨提示！</gradient><gradient:#128BDE:#60C6FF>请不要透露您的密码！</gradient></b>
    - '<gradient:#C7E7FD:#C7E7FD>登录JingBuMC</gradient><gradient:#C7E7FD:#B5D9EE>即可停止下载原神 </gradient>'
  width: 150
  submitButton: "<green>登录</green>"
  # actions: กำหนดปุ่มได้เอง (อย่างน้อยต้องมี type: submit)
  actions:
    - type: submit
      label: "<green>登录</green>"

register:
  title: "正在自动下载原神......"
  body:
    - <b><gradient:#128BDE:#128BDE>温馨提示！</gradient><gradient:#128BDE:#60C6FF>请不要透露您的密码！</gradient></b>
    - '<gradient:#C7E7FD:#C7E7FD>注册加入JingBuMC</gradient><gradient:#C7E7FD:#B5D9EE>即可停止下载原神 </gradient>'
  submitButton: "<green>注册</green>"
  width: 150
  actions:
    - type: submit
      label: "<green>注册 11150 FASD</green>"

rule:
  agree:
    enabled: true
    key: "agree"
    label: "<gray>我接受服务器规则</gray>"
  title: "<white>📜 服务器规则"
  body:
    - "<gray>1) 禁止使用辅助程序</gray>"
    - "<gray>2) 禁止广告/骚扰</gray>"
    - "<gray>3) 互相尊重</gray>"
    - "<gray>点击 <green>确认</green> 接受规则并前往注册页面</gray>"
  confirmButton: "<green>确认"

messages:
  login:
    button_password: "密码"
    empty_password: "<red>请输入密码</red>"
    wrong_password: "<red>密码错误</red>"
    need_register: "<yellow>还没有账号，请注册</yellow>"

  register:
    button_password: "密码"
    confirm_password: "再次输入密码"
    need_both: "<red>请填写密码和确认密码</red>"
    mismatch: "<red>两次密码不一致</red>"
    too_short: "<red>密码长度至少 <white>%min%</white> 个字符</red>"
    too_long: "<red>密码长度不能超过 <white>%max%</white> 个字符</red>"
    invalid: "<red>密码无效</red>"
    already: "<yellow>您已注册，请登录</yellow>"
    failed: "<red>注册失败，请重试</red>"